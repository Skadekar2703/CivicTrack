<div class="flex items-center gap-3">

<span class="text-xl font-black text-[#4FC3F7] tracking-tighter font-['Public_Sans']">CivicTrack</span>
</div>
<button class="material-symbols-outlined text-gray-400 hover:opacity-80 transition-opacity p-2 active:scale-95 duration-100">
            notifications
        </button>
</header>
<main class="pt-20 pb-32 px-margin max-w-2xl mx-auto space-y-lg">
<!-- Screen Title Section -->
<div class="space-y-xs">
<h1 class="font-h2 text-h2 text-on-surface">Report New Issue</h1>
<p class="text-on-surface-variant font-body-md">Help improve your city by reporting local concerns.</p>
</div>
<!-- Issue Upload Area -->
<section class="relative group">
<div class="custom-dashed w-full h-48 flex flex-col items-center justify-center space-y-sm bg-surface-container-low transition-all group-hover:bg-surface-container-high cursor-pointer">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
</div>
<div class="text-center">
<p class="font-label-md text-label-md text-on-surface">Upload Photo or Video</p>
<p class="text-label-sm text-outline">JPEG, PNG, MP4 up to 10MB</p>
</div>
</div>
</section>
<!-- Form Fields -->
<section class="space-y-gutter">
<!-- Issue Type -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant">ISSUE CATEGORY</label>
<div class="relative">
<select class="w-full appearance-none bg-[#1F2630] border-outline-variant rounded-xl p-md pr-xl font-label-md text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent transition-all cursor-pointer">
<option disabled="" selected="" value="">Select a category</option>
<option value="road">Road/Pothole</option>
<option value="light">Street Light</option>
<option value="waste">Waste/Trash</option>
<option value="other">Other</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none">
<span class="material-symbols-outlined text-primary">expand_more</span>
</div>
</div>
</div>
<!-- Description -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-on-surface-variant">DESCRIPTION</label>
<textarea class="w-full bg-surface-container-high border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent text-on-surface placeholder:text-outline transition-all" placeholder="Provide details about the issue..." rows="4"></textarea>
</div>
<!-- Location Selector -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant">LOCATION</label>
<button class="text-primary font-label-sm flex items-center gap-xs">
<span class="material-symbols-outlined text-sm">my_location</span> Use Current
                    </button>
</div>
<div class="relative w-full h-40 rounded-xl overflow-hidden border border-outline-variant">
<img alt="Location Map Preview" class="w-full h-full object-cover grayscale brightness-50 contrast-125" data-alt="Stylized dark mode urban map showing city blocks with subtle blue and gray tones and a glowing central marker" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCvOhuoEMQvov8H3XnveEZesJpNZQtwmkMEusst1-5CD-HTZ6VqP9NWtnT7ai841RsMrP7SEXGwyGBWImI3ASy3xiWBl-YSrO0olDfbnpY4GPkYXcJMJg1QrwuIYozBIOg28wVn6DTK9r1gMKKUYyfxbFstz8wit6ZcMM-mEvfAoope8S9CSlcRAPnxnxorK_Me8NY619Hziah0npTy8PymTtdchpsQ52nkKcgewhnWYrU1WF0Mcw1dFB62Wss2h0BaP70bN6REyDFq"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full scale-150"></div>
</div>
</div>
<div class="absolute bottom-2 left-2 right-2 p-2 bg-surface-container-lowest/80 backdrop-blur-md rounded-lg flex items-center gap-base">
<span class="material-symbols-outlined text-primary-container text-base">near_me</span>
<span class="text-label-sm text-on-surface">Market St &amp; 5th St, San Francisco</span>
</div>
</div>
</div>
</section>
<!-- Submit Button -->
<div class="pt-lg">
<button class="w-full primary-gradient h-14 rounded-xl flex items-center justify-center gap-base text-white font-bold text-lg shadow-[0_0_20px_rgba(33,150,243,0.3)] hover:shadow-[0_0_30px_rgba(33,150,243,0.5)] transition-all active:scale-[0.98]">
                Submit Report

</button>
</div>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Public_Sans'] text-[11px] font-semibold uppercase tracking-wider mt-1">Report</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-500 hover:text-[#4FC3F7]/80 transition-colors" href="#">
<span class="material-symbols-outlined">map</span>
<span class="font-['Public_Sans'] text-[11px] font-semibold uppercase tracking-wider mt-1">Map</span>
</a>
